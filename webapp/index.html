<!doctype html>
<html lang="zh-CN" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0a" />

  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com;
    script-src 'self' 'unsafe-inline';
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    img-src 'self' data:;
    connect-src 'self';
    font-src 'self' https://fonts.gstatic.com;
    form-action 'self';
    base-uri 'self';
  " />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <link rel="icon" type="image/svg+xml" href="/tirisfal-logo-bg.svg" />
    <link rel="alternate icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <title>Tirisfal - Secure Password Manager</title>
    <style>
      html, body, #root { min-height: 100%; }
      body {
        margin: 0;
        background: #0a0a0a;
        color: #f0f0f0;
        font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
      }
      .boot-screen {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        box-sizing: border-box;
        background: #0a0a0a;
      }
      .boot-card {
        width: min(400px, 100%);
        display: grid;
        gap: 14px;
        justify-items: center;
        padding: 32px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        background: rgba(20, 20, 20, 0.80);
        box-shadow: 0 0 24px rgba(77, 166, 255, 0.06), 0 20px 60px rgba(0, 0, 0, 0.50);
        backdrop-filter: blur(20px);
      }
      .boot-logo {
        width: 74px;
        height: 58px;
        object-fit: contain;
        filter: drop-shadow(0 0 8px rgba(77, 166, 255, 0.20));
      }
      .boot-brand {
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 6px;
        color: #4da6ff;
      }
      .boot-line {
        width: 72%;
        height: 10px;
        border-radius: 999px;
        background: linear-gradient(90deg, rgba(77,166,255,0.08), rgba(77,166,255,0.16), rgba(77,166,255,0.08));
        background-size: 180% 100%;
        animation: boot-shimmer 1.4s ease-in-out infinite;
      }
      .boot-line.short { width: 46%; }
      @keyframes boot-shimmer { 0%{background-position:180% 0} 100%{background-position:-180% 0} }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-screen">
        <div class="boot-card" aria-label="Loading Tirisfal">
          <img class="boot-logo" src="/tirisfal-logo.svg" alt="Tirisfal" />
          <div class="boot-brand">Tirisfal</div>
          <div class="boot-line"></div>
          <div class="boot-line short"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
